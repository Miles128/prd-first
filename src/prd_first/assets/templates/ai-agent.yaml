type: ai-agent
name: AI / Agent 项目
description: LLM 应用、Agent、prompt 工程、RAG、自动化 AI 工作流。
fields:
  - key: problem
    label: 问题陈述
    required: true
    type: text
    prompt: "这个 AI 应用解决什么问题?为什么用 AI?"

  - key: users
    label: 目标用户
    required: true
    type: text
    prompt: "谁用?他们对 AI 输出的容忍度?"

  - key: goal
    label: 成功定义
    required: true
    type: text
    prompt: "怎样算成功?给出量化质量基线。"

  - key: role
    label: Agent 角色
    required: true
    type: text
    prompt: "这个 Agent 扮演什么角色?一句话定位。"

  - key: scope
    label: MVP 范围
    required: true
    type: list
    prompt: "第一版 Agent 要具备哪些能力?"

  - key: non_goals
    label: 非目标
    required: true
    type: list
    prompt: "明确不做哪些?"

  - key: evaluation
    label: 评估方式
    required: true
    type: text
    prompt: "怎么判断做得对?有没有评测数据?"

  - key: failure_modes
    label: 失败模式与降级
    required: true
    type: list
    prompt: "会怎么失败?失败时怎么降级?"

  - key: tech_stack
    label: 技术栈
    required: true
    type: text
    prompt: "用什么模型/框架/外部服务?"

  - key: acceptance
    label: 验收标准
    required: true
    type: list
    prompt: "怎样验收?(必须包含量化指标)"
