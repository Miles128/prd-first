type: backend-data
name: 后端 / 数据管道
description: API 服务、数据处理管道、定时任务、ETL、系统集成。
fields:
  - key: problem
    label: 问题陈述
    required: true
    type: text
    prompt: "这个后端/数据任务解决什么问题?"

  - key: goal
    label: 成功定义
    required: true
    type: text
    prompt: "怎样算成功?(吞吐量/延迟/正确率/SLA)"

  - key: sources
    label: 数据来源
    required: true
    type: list
    prompt: "数据从哪来?(数据库/API/文件/消息队列)"

  - key: data_flow
    label: 数据流
    required: true
    type: text
    prompt: "数据怎么流动?(源 → 处理 → 存储 → 输出)"

  - key: scope
    label: MVP 范围
    required: true
    type: list
    prompt: "第一版要覆盖哪些数据源和处理步骤?"

  - key: non_goals
    label: 非目标
    required: true
    type: list
    prompt: "明确不做哪些?"

  - key: external_deps
    label: 外部依赖
    required: true
    type: list
    prompt: "依赖哪些外部系统/服务?它们挂了会怎样?"

  - key: fault_tolerance
    label: 容错策略
    required: true
    type: text
    prompt: "出错怎么办?(重试/死信队列/降级/熔断)"

  - key: tech_stack
    label: 技术栈
    required: true
    type: text
    prompt: "用什么语言/框架/数据库/消息队列?"

  - key: acceptance
    label: 验收标准
    required: true
    type: list
    prompt: "怎样验收?(包括出错场景)"
