type: web-app
name: Web 应用
description: 前端页面、全栈服务、带用户界面的应用。
fields:
  - key: problem
    label: 问题陈述
    required: true
    type: text
    prompt: "这个项目要解决什么问题?"

  - key: users
    label: 目标用户
    required: true
    type: text
    prompt: "谁会用?他们的技术水平和使用场景?"

  - key: goal
    label: 成功定义
    required: true
    type: text
    prompt: "做完了怎样算成功?给一个可验证标准。"

  - key: scope
    label: MVP 范围
    required: true
    type: list
    prompt: "MVP 要包含哪些功能?(逐条输入,空行结束)"

  - key: non_goals
    label: 非目标
    required: true
    type: list
    prompt: "明确不做什么?(挡住 scope creep)"

  - key: pages
    label: 页面结构
    required: true
    type: list
    prompt: "需要哪些页面/路由?"

  - key: auth
    label: 认证方式
    required: false
    type: single
    choices: ["无认证", "邮箱密码", "OAuth(Google/GitHub)", "SSO/企业"]
    prompt: "需要登录吗?用哪种认证?"

  - key: tech_stack
    label: 技术栈
    required: true
    type: text
    prompt: "前端/后端/数据库/部署分别用什么?"

  - key: acceptance
    label: 验收标准
    required: true
    type: list
    prompt: "完成时怎样验收?(可勾选的检查项)"
