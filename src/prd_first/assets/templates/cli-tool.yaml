type: cli-tool
name: CLI 工具
description: 命令行工具、脚本、自动化任务。
fields:
  - key: problem
    label: 问题陈述
    required: true
    type: text
    prompt: "这个工具解决什么问题?为什么用 CLI?"

  - key: users
    label: 目标用户
    required: true
    type: text
    prompt: "谁会用?他们熟悉命令行吗?"

  - key: goal
    label: 成功定义
    required: true
    type: text
    prompt: "怎样算成功?给可验证标准。"

  - key: commands
    label: 命令结构
    required: true
    type: list
    prompt: "有哪些子命令?(格式:命令 说明)"

  - key: scope
    label: MVP 范围
    required: true
    type: list
    prompt: "第一版必须有哪些命令/能力?"

  - key: non_goals
    label: 非目标
    required: true
    type: list
    prompt: "明确不做哪些?"

  - key: input
    label: 输入格式
    required: true
    type: text
    prompt: "输入从哪来?(参数/stdin/文件/配置)"

  - key: tech_stack
    label: 技术栈
    required: true
    type: text
    prompt: "用什么语言/框架?有哪些外部依赖?"

  - key: acceptance
    label: 验收标准
    required: true
    type: list
    prompt: "怎样验收?(包括管道调用和退出码)"
