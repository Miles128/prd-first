type: web-app
name: Web 应用决策树追问指南
description: |
  把 web-app 模板字段当作初始决策树地图，但允许用户添加新分支。
  每个分支要追问到"共享理解"：即用户和 AI 都清楚答案、边界和依赖。
branches:
  - key: problem
    label: 问题陈述
    drill:
      - 用户现在如何解决这个问题？如果不做这个项目会怎样？
      - 这是替代现有方案，还是开辟全新场景？
      - 问题的优先级是 P0 还是"有更好"？

  - key: users
    label: 目标用户
    drill:
      - 主要用户角色的技术水平和使用频率？
      - 是否有非目标用户需要明确排除？
      - 用户最痛的三件事是什么？

  - key: goal
    label: 成功定义
    drill:
      - 成功的指标是可量化的吗？如何收集数据？
      - 如果一个月后指标没达成，会先怀疑哪个假设？
      - 有没有"成功但不可接受"的情况？

  - key: scope
    label: MVP 范围
    drill:
      - 如果砍掉一半功能，留下哪一半仍能验证核心价值？
      - 每个功能对应的用户场景是什么？
      - 哪些功能现在不做，但用户大概率很快会问？

  - key: non_goals
    label: 非目标
    drill:
      - 这些非目标是否和用户/利益相关者对齐过？
      - 有没有和非目标看起来冲突的需求？
      - 如果用户中途要求做非目标里的某一项，怎么回应？

  - key: pages
    label: 页面结构
    drill:
      - 每个页面的入口和退出路径是什么？
      - 页面之间的数据如何流转？
      - 是否有权限或角色差异影响页面可见性？

  - key: auth
    label: 认证方式
    drill:
      - 选择这种认证方式的核心原因是什么？
      - 用户登录失败后有哪些状态？
      - 是否需要会话过期、多设备登录等策略？

  - key: tech_stack
    label: 技术栈
    drill:
      - 团队对这套栈的熟悉度如何？
      - 是否有非功能性约束（合规、部署环境、性能基线）影响选型？
      - 如果某个依赖 6 个月后不维护了，替代方案是什么？

  - key: acceptance
    label: 验收标准
    drill:
      - 每条标准是否可以用自动测试或人工走查验证？
      - 验收时需要在什么环境、用什么账号、准备什么数据？
      - 有没有"隐形验收标准"（如性能、可访问性、SEO）？

optional_branches:
  - key: data_model
    label: 数据模型
    trigger: 当用户提到多个实体关系复杂，或需要权限/多租户时
  - key: api_contract
    label: API 契约
    trigger: 当需要前后端分离或暴露接口给第三方时
  - key: deployment
    label: 部署与运维
    trigger: 当项目需要上线、CI/CD 或监控时
  - key: accessibility
    label: 可访问性
    trigger: 当目标用户包含非典型设备或能力差异人群时
