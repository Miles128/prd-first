type: ai-agent
name: AI Agent 项目决策树追问指南
description: |
  AI Agent 项目的风险往往不在功能，而在评估、失败模式和成本。本指南强制追问这些分支。
branches:
  - key: problem
    label: 问题陈述
    drill:
      - 这个 Agent 替代的是人工判断还是已有自动化？
      - 错误代价有多高？是"推荐错一首歌"还是"转账错误"？
      - 不做 Agent，用规则引擎能否先解决 80%？

  - key: users
    label: 目标用户
    drill:
      - 最终用户是直接和 Agent 对话，还是消费 Agent 的输出？
      - 用户对延迟的容忍度是多少？
      - 用户能否介入修正 Agent 的决策？

  - key: goal
    label: 成功定义
    drill:
      - 成功指标必须是可量化的，例如准确率、召回率、用户满意度。
      - 指标如何收集？是否有人工标注流程？
      - 达到多少分算上线？多少分算撤回？

  - key: role
    label: Agent 角色
    drill:
      - Agent 的角色设定会如何影响它的回答风格和行为边界？
      - 角色和能力是否匹配？会不会让用户产生错误预期？

  - key: input_contract
    label: 输入契约
    drill:
      - 输入的来源、格式、长度限制是什么？
      - 输入是否包含敏感信息？如何脱敏或授权？
      - 输入缺失必填字段时怎么办？

  - key: output_contract
    label: 输出契约
    drill:
      - 输出是结构化数据、自然语言还是动作调用？
      - 下游系统如何消费输出？有没有 schema 约束？
      - 输出需要附带置信度或解释吗？

  - key: failure_modes
    label: 失败模式与降级
    drill:
      - 列出至少 3 种典型失败模式及对应的降级策略。
      - Agent 拒绝回答和答错，哪个更危险？
      - 是否需要人工审核回路？触发条件是什么？

  - key: evaluation
    label: 评估方式
    drill:
      - 评估数据集从哪里来？是否覆盖边缘 case？
      - 用自动化指标还是人工评估？各占多少？
      - 评估频率是每次改动、每日还是每周？

  - key: non_goals
    label: 非目标
    drill:
      - 哪些能力明确不做，以免用户误用？
      - 是否有合规或伦理红线？

  - key: acceptance
    label: 验收标准
    drill:
      - 是否有端到端测试覆盖主路径？
      - 是否定义了坏 case 的上限？

optional_branches:
  - key: tools
    label: 工具清单
    trigger: 当 Agent 需要调用外部 API、数据库或文件系统时
  - key: cost_latency
    label: 成本与延迟
    trigger: 当调用付费模型或需要实时响应时
  - key: safety
    label: 安全护栏
    trigger: 当 Agent 可能接触用户数据或执行动作时
