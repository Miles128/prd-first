name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check src tests

      - name: Mypy check
        run: mypy src/prd_first

      - name: Bandit security scan
        run: bandit -r src/prd_first

      - name: Pytest with coverage
        run: pytest --cov=prd_first --cov-report=term-missing tests
